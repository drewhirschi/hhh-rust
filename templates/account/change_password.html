{% extends "base.html" %}

{% block title %}Change Password - HHH Gym{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="mb-4">
        <a href="/account" class="btn btn-ghost btn-sm gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Back to Account
        </a>
    </div>

    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl mb-4">Change Password</h2>

            <form method="post" action="/account/password" class="space-y-4">
                <div class="form-control">
                    <label class="label" for="current_password">
                        <span class="label-text">Current Password</span>
                    </label>
                    <input type="password" id="current_password" name="current_password"
                           placeholder="Enter current password"
                           class="input input-bordered w-full" required>
                </div>

                <div class="form-control">
                    <label class="label" for="new_password">
                        <span class="label-text">New Password</span>
                    </label>
                    <input type="password" id="new_password" name="new_password"
                           placeholder="Enter new password"
                           class="input input-bordered w-full" required minlength="8">
                    <label class="label">
                        <span class="label-text-alt text-base-content/50">Minimum 8 characters</span>
                    </label>
                </div>

                <div class="form-control">
                    <label class="label" for="confirm_password">
                        <span class="label-text">Confirm New Password</span>
                    </label>
                    <input type="password" id="confirm_password" name="confirm_password"
                           placeholder="Confirm new password"
                           class="input input-bordered w-full" required minlength="8">
                </div>

                <div class="card-actions justify-end mt-4">
                    <a href="/account" class="btn btn-ghost">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
