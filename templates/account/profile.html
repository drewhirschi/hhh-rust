{% extends "base.html" %}

{% block title %}My Account - HHH Gym{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-3xl font-bold mb-6">My Account</h1>

    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title mb-4">Profile Information</h2>

            <form method="post" action="/account" class="space-y-4">
                <label class="input w-full" for="display_name">
                    <span class="label">Display Name</span>
                    <input type="text" id="display_name" name="display_name" value="{{ profile.display_name }}" required>
                </label>

                <label class="input w-full" for="email">
                    <span class="label">Email</span>
                    <input type="email" id="email" name="email" value="{{ profile.email }}" required>
                </label>

                <div>
                    <label class="input w-full">
                        <span class="label">Role</span>
                        <input type="text" value="{{ profile.role }}" disabled>
                    </label>
                    <span class="text-sm text-base-content/50 mt-1 block">Contact an admin to change your role</span>
                </div>

                <label class="input w-full">
                    <span class="label">Member Since</span>
                    <input type="text" value="{{ profile.created_at }}" disabled>
                </label>

                <div class="card-actions justify-end mt-4">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>

            <div class="divider"></div>

            <a href="/account/password" class="btn btn-outline btn-sm">Change Password</a>
        </div>
    </div>
</div>
{% endblock %}
