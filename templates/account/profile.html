{% extends "base.html" %}

{% block title %}My Account - HHH Gym{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-3xl font-bold mb-6">My Account</h1>

    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title mb-4">Profile Information</h2>

            <form method="post" action="/account" class="space-y-4">
                <div class="form-control">
                    <label class="label" for="display_name">
                        <span class="label-text">Display Name</span>
                    </label>
                    <input type="text" id="display_name" name="display_name" value="{{ profile.display_name }}"
                           class="input input-bordered w-full" required>
                </div>

                <div class="form-control">
                    <label class="label" for="email">
                        <span class="label-text">Email</span>
                    </label>
                    <input type="email" id="email" name="email" value="{{ profile.email }}"
                           class="input input-bordered w-full" required>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Role</span>
                    </label>
                    <input type="text" value="{{ profile.role }}" class="input input-bordered w-full" disabled>
                    <label class="label">
                        <span class="label-text-alt text-base-content/50">Contact an admin to change your role</span>
                    </label>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Member Since</span>
                    </label>
                    <input type="text" value="{{ profile.created_at }}" class="input input-bordered w-full" disabled>
                </div>

                <div class="card-actions justify-end mt-4">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>

            <div class="divider"></div>

            <a href="/account/password" class="btn btn-outline btn-sm">Change Password</a>
        </div>
    </div>
</div>
{% endblock %}
