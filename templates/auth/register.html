{% extends "base.html" %}

{% block title %}Register - HHH Gym{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center mb-2">Create Account</h2>
            <p class="text-center text-base-content/60 mb-4">Join HHH Gym with your invite code</p>

            {% if let Some(error) = error %}
            <div role="alert" class="alert alert-error mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/register/{{ code }}" class="space-y-4">
                <input type="hidden" name="code" value="{{ code }}">

                <label class="input w-full" for="display_name">
                    <span class="label">Display Name</span>
                    <input type="text" id="display_name" name="display_name" placeholder="Your name" required autofocus>
                </label>

                <label class="input w-full" for="email">
                    <span class="label">Email</span>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </label>

                <label class="input w-full" for="password">
                    <span class="label">Password</span>
                    <input type="password" id="password" name="password" placeholder="Choose a password" required minlength="8">
                </label>

                <label class="input w-full" for="password_confirm">
                    <span class="label">Confirm Password</span>
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="Confirm your password" required minlength="8">
                </label>

                <div class="mt-6">
                    <button type="submit" class="btn btn-primary w-full">Create Account</button>
                </div>
            </form>

            <p class="text-center text-sm text-base-content/60 mt-4">
                Already have an account? <a href="/login" class="link link-primary">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
