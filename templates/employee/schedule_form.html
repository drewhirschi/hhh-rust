{% extends "base.html" %}

{% block title %}Schedule a Class - HHH Gym{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="mb-4">
        <a href="/employee/classes" class="btn btn-ghost btn-sm gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Back to Classes
        </a>
    </div>

    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl mb-4">Schedule a Class</h2>
            <p class="text-base-content/60 mb-4">The end time will be calculated automatically based on the class duration.</p>

            <form method="post" action="/employee/classes/schedule" class="space-y-4">
                <div class="form-control">
                    <label class="label" for="class_definition_id">
                        <span class="label-text">Class</span>
                    </label>
                    <select id="class_definition_id" name="class_definition_id"
                            class="select select-bordered w-full" required>
                        <option value="" disabled selected>Select a class</option>
                        {% for class in classes %}
                        <option value="{{ class.id }}">{{ class.name }} ({{ class.duration_minutes }} min, cap: {{ class.capacity }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-control">
                    <label class="label" for="instructor_id">
                        <span class="label-text">Instructor</span>
                    </label>
                    <select id="instructor_id" name="instructor_id"
                            class="select select-bordered w-full">
                        <option value="">No instructor assigned</option>
                        {% for instructor in instructors %}
                        <option value="{{ instructor.id }}">{{ instructor.display_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-control">
                    <label class="label" for="starts_at">
                        <span class="label-text">Start Date &amp; Time</span>
                    </label>
                    <input type="datetime-local" id="starts_at" name="starts_at"
                           class="input input-bordered w-full" required>
                </div>

                <div class="card-actions justify-end mt-6">
                    <a href="/employee/classes" class="btn btn-ghost">Cancel</a>
                    <button type="submit" class="btn btn-primary">Schedule Class</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
